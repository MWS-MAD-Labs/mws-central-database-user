services:
  db:
    image: postgres:16-alpine
    container_name: mws-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: PostgresPassword123
      POSTGRES_DB: mws-center
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: mws-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mws-server
    environment:
      # Container-to-container hostname is the compose service name `db`,
      # not localhost — fixed here since it's defined by the `db` service
      # above in this same file, not something Komodo needs to supply.
      - DATABASE_URL=postgresql://root:PostgresPassword123@db:5432/mws-center?schema=public
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - ALLOWED_DOMAIN=${ALLOWED_DOMAIN}
      - CLIENT_URL=${CLIENT_URL}
      # Defaults target the `minio` service above for local dev. In
      # production, Komodo's Environment panel overrides these to point at
      # wherever MinIO actually lives — same pattern as the other secrets
      # below, just with local-friendly fallbacks instead of blank ones.
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin123}
      - MINIO_BUCKET=${MINIO_BUCKET:-mws-data-center}
    ports:
      # Host port 3000 was already taken by another stack on this VPS.
      - "3010:3000"
    depends_on:
      - db
      - minio
    restart: unless-stopped
    # No env_file here: server/.env is gitignored, so it will not exist in
    # the repo Komodo clones. Supply these values via Komodo's Stack
    # "Environment" panel instead — it writes them to a .env file next to
    # this compose file, which is what the ${VAR} references above resolve
    # against.

#   client:
#     build:
#       context: ./client
#       dockerfile: Dockerfile
#     container_name: mws-client
#     ports:
#       - "80:80" # Access the web app at http://localhost:5173
#       - "443:443" # Access the web app at https://localhost:5173
#     volumes:
#       - ./certs:/etc/nginx/certs:ro
#     depends_on:
#       - server
#     restart: unless-stopped

volumes:
  pgdata:
  miniodata:
